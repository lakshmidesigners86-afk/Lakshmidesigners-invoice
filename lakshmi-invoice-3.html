<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lakshmi Designers — Invoice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#f3e8ef;min-height:100vh;padding:1.5rem;color:#2E0B40;}
.wrap{max-width:660px;margin:0 auto;}
.page-title{text-align:center;margin-bottom:1.5rem;}
.page-title h1{font-size:22px;letter-spacing:4px;color:#7B2D5E;font-weight:bold;}
.page-title p{font-size:11px;color:#995375;letter-spacing:3px;margin-top:3px;}
.card{background:#fff;border:0.5px solid #e0c0d0;border-radius:14px;padding:1.2rem;margin-bottom:1rem;}
.card h3{font-size:11px;color:#7B2D5E;text-transform:uppercase;letter-spacing:2px;margin-bottom:.9rem;padding-bottom:7px;border-bottom:0.5px solid #f0dde8;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fi{display:flex;flex-direction:column;gap:4px;}
.fi label{font-size:10px;color:#a06080;text-transform:uppercase;letter-spacing:1px;}
.fi input,.fi select{font-size:14px;padding:8px 11px;border-radius:7px;border:1px solid #e0c0d0;background:#fdf8fb;color:#2E0B40;font-family:Georgia,serif;outline:none;width:100%;}
.fi input:focus,.fi select:focus{border-color:#7B2D5E;}
.ih{display:grid;grid-template-columns:3fr 55px 85px 85px 26px;gap:6px;padding:7px 10px;background:#f7e8f2;border-radius:7px;margin-bottom:7px;}
.ih span{font-size:10px;color:#7B2D5E;text-transform:uppercase;letter-spacing:1px;}
.ir{display:grid;grid-template-columns:3fr 55px 85px 85px 26px;gap:6px;align-items:center;margin-bottom:7px;}
.ir input{font-size:13px;padding:7px 9px;border-radius:7px;border:1px solid #e0c0d0;background:#fdf8fb;color:#2E0B40;font-family:Georgia,serif;outline:none;width:100%;}
.it{font-size:13px;color:#2E0B40;font-weight:bold;text-align:right;}
.rb{background:none;border:none;color:#c04040;cursor:pointer;font-size:17px;padding:0;}
.add-btn{width:100%;padding:8px;border:1.5px dashed #c090b0;border-radius:7px;background:transparent;color:#7B2D5E;font-size:13px;cursor:pointer;font-family:Georgia,serif;margin-top:3px;}
.add-btn:hover{background:#fdf0f7;}
.tots{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:12px;padding-top:10px;border-top:0.5px solid #f0dde8;}
.tr{display:flex;justify-content:space-between;font-size:13px;min-width:210px;}
.tr span:first-child{color:#a06080;}
.tg{font-size:16px;font-weight:bold;color:#7B2D5E;}
.acts{display:flex;gap:10px;flex-wrap:wrap;margin-top:1.5rem;}
.bp{flex:1;padding:11px;border-radius:9px;border:none;background:#7B2D5E;color:#fff;font-size:14px;cursor:pointer;font-family:Georgia,serif;}
.bp:hover{background:#5C1A6B;}
.bw{flex:1;padding:11px;border-radius:9px;border:none;background:#25D366;color:#fff;font-size:14px;cursor:pointer;font-family:Georgia,serif;}
.bw:hover{background:#128C7E;}
.bc{padding:11px 18px;border-radius:9px;border:1px solid #e0c0d0;background:transparent;color:#a06080;font-size:14px;cursor:pointer;font-family:Georgia,serif;}
#qr-hidden{position:absolute;left:-9999px;top:0;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2E0B40;color:#fff;padding:11px 22px;border-radius:9px;font-size:13px;display:none;z-index:9999;font-family:Georgia,serif;}
@media(max-width:480px){.fg{grid-template-columns:1fr;}.ih,.ir{grid-template-columns:2fr 46px 72px 72px 22px;}.acts{flex-direction:column;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-title"><h1>Lakshmi Designers</h1><p>✦ INVOICE GENERATOR ✦</p></div>
  <div class="card">
    <h3>Invoice Details</h3>
    <div class="fg">
      <div class="fi"><label>Invoice No</label><input id="inv-num"/></div>
      <div class="fi"><label>Date</label><input type="date" id="inv-date"/></div>
      <div class="fi"><label>Due Date</label><input type="date" id="inv-due"/></div>
      <div class="fi"><label>Status</label>
        <select id="inv-status"><option>Pending</option><option>Paid</option><option>Advance Paid</option></select>
      </div>
    </div>
  </div>
  <div class="card">
    <h3>Customer Details</h3>
    <div class="fg">
      <div class="fi"><label>Name</label><input id="cust-name" placeholder="e.g. Priya Reddy"/></div>
      <div class="fi"><label>Phone</label><input id="cust-phone" placeholder="9876543210" type="tel"/></div>
    </div>
  </div>
  <div class="card">
    <h3>Order Items</h3>
    <div class="ih"><span>Description</span><span>Qty</span><span>Price</span><span style="text-align:right">Total</span><span></span></div>
    <div id="ilist"></div>
    <button class="add-btn" onclick="addItem()">+ Add Item</button>
    <div class="tots">
      <div class="tr"><span>Subtotal</span><span id="sub">Rs. 0</span></div>
      <div class="tr"><span>Discount (Rs.)</span><span><input id="disc" type="number" min="0" value="0" oninput="calcTotal()" style="width:75px;padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid #e0c0d0;background:#fdf8fb;color:#2E0B40;font-family:Georgia,serif;text-align:right;"/></span></div>
      <div class="tr tg"><span>Total</span><span id="gtotal">Rs. 0</span></div>
    </div>
  </div>
  <div class="card">
    <h3>Notes (optional)</h3>
    <div class="fi"><input id="notes" placeholder="e.g. Delivery in 5 days. Advance Rs.500 received."/></div>
  </div>
  <div class="acts">
    <button class="bp" onclick="generatePDF()">Download PDF</button>
    <button class="bw" onclick="shareWA()">Share on WhatsApp</button>
    <button class="bc" onclick="clearForm()">Clear</button>
  </div>
</div>
<div id="qr-hidden"></div>
<div class="toast" id="toast"></div>

let items=[];
let cnt=parseInt(localStorage.getItem('ldinv4')||'1');

window.onload=()=>{
  const t=new Date().toISOString().split('T')[0];
  const du=new Date();du.setDate(du.getDate()+7);
  document.getElementById('inv-date').value=t;
  document.getElementById('inv-due').value=du.toISOString().split('T')[0];
  document.getElementById('inv-num').value='LD-'+String(cnt).padStart(3,'0');
  addItem();
};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2800);}
function addItem(){items.push({id:Date.now(),desc:'',qty:1,price:0});render();}
function removeItem(id){items=items.filter(i=>i.id!==id);render();calc();}
function upd(id,f,v){const i=items.find(x=>x.id===id);if(!i)return;i[f]=(f==='qty'||f==='price')?parseFloat(v)||0:v;calc();const e=document.getElementById('it'+id);if(e)e.textContent='Rs.'+((i.qty||0)*(i.price||0)).toFixed(0);}
function render(){
  document.getElementById('ilist').innerHTML=items.map(i=>
    '<div class="ir">'+
    '<input placeholder="e.g. Blouse stitching" value="'+i.desc+'" oninput="upd('+i.id+',\'desc\',this.value)"/>'+
    '<input type="number" min="1" value="'+i.qty+'" oninput="upd('+i.id+',\'qty\',this.value)"/>'+
    '<input type="number" min="0" value="'+(i.price||'')+'" placeholder="0" oninput="upd('+i.id+',\'price\',this.value)"/>'+
    '<span class="it" id="it'+i.id+'">Rs.'+((i.qty||0)*(i.price||0)).toFixed(0)+'</span>'+
    '<button class="rb" onclick="removeItem('+i.id+')">x</button>'+
    '</div>'
  ).join('');calc();
}
function calc(){
  const s=items.reduce((a,i)=>a+((i.qty||0)*(i.price||0)),0);
  const d=parseFloat(document.getElementById('disc').value)||0;
  document.getElementById('sub').textContent='Rs.'+s.toFixed(0);
  document.getElementById('gtotal').textContent='Rs.'+Math.max(0,s-d).toFixed(0);
}
function get(){
  const s=items.reduce((a,i)=>a+((i.qty||0)*(i.price||0)),0);
  const d=parseFloat(document.getElementById('disc').value)||0;
  return{num:document.getElementById('inv-num').value||'LD-001',date:document.getElementById('inv-date').value,due:document.getElementById('inv-due').value,status:document.getElementById('inv-status').value,name:document.getElementById('cust-name').value||'Customer',phone:document.getElementById('cust-phone').value||'',notes:document.getElementById('notes').value||'',items:[...items],disc:d,sub:s,grand:Math.max(0,s-d)};
}
function upiUrl(amt,name,num){return 'upi://pay?pa='+UPI+'&pn='+encodeURIComponent('Lakshmi Designers')+'&am='+amt.toFixed(2)+'&cu=INR&tn='+encodeURIComponent('Invoice '+num+' - '+name);}
function fdate(d){if(!d)return'-';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}
function genQR(txt){return new Promise(r=>{const div=document.getElementById('qr-hidden');div.innerHTML='';new QRCode(div,{text:txt,width:150,height:150,correctLevel:QRCode.CorrectLevel.M});setTimeout(()=>{const c=div.querySelector('canvas'),i=div.querySelector('img');r(c?c.toDataURL('image/png'):i?i.src:null);},400);});}

async function generatePDF(){
  const d=get();
  if(d.name==='Customer'){toast('Customer name enter cheyyi!');return;}
  toast('Generating premium invoice...');
  const qr=await genQR(upiUrl(d.grand,d.name,d.num));
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,H=297,L=15,R=15,CW=W-L-R;

  // ════════════════════════════
  // HEADER - elegant dark band
  // ════════════════════════════
  // Deep gradient bg (simulate with two rects)
  doc.setFillColor(44,8,62);
  doc.rect(0,0,W,58,'F');
  doc.setFillColor(90,28,80);
  doc.rect(0,0,W,28,'F');

  // Decorative gold lines
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.4);
  doc.line(L,6,W-R,6);
  doc.line(L,52,W-R,52);
  // Side accent lines
  doc.line(L,6,L,52);
  doc.line(W-R,6,W-R,52);

  // Gold corner ornaments
  function corner(x,y,d1,d2){
    doc.setDrawColor(201,160,76);doc.setLineWidth(0.8);
    doc.line(x,y,x+d1,y);doc.line(x,y,x,y+d2);
    doc.setFillColor(201,160,76);doc.circle(x,y,0.8,'F');
  }
  corner(L,6,6,6);corner(W-R,6,-6,6);corner(L,52,6,-6);corner(W-R,52,-6,-6);

  // Logo - left side, blended (no box)
  try{doc.addImage(LOGO,'PNG',L+3,9,38,38);}catch(e){}

  // Brand name - elegant center
  doc.setTextColor(255,240,220);
  doc.setFontSize(22);doc.setFont('times','bolditalic');
  doc.text('Lakshmi Designers',W/2+8,22,{align:'center'});

  // Tagline
  doc.setFontSize(7);doc.setFont('helvetica','normal');
  doc.setTextColor(201,160,76);
  doc.text('Y O U R   S T Y L E ,   O U R   C R A F T',W/2+8,29,{align:'center'});

  // Address line
  doc.setFontSize(7.5);doc.setTextColor(220,190,210);doc.setFont('helvetica','normal');
  doc.text('Bus Stand Road, Near Patil Nursing Home, Above Karur Vysya Bank, Gangavathi',W/2+8,36,{align:'center'});
  doc.text('UPI: '+UPI,W/2+8,42,{align:'center'});

  // ════════════════════════════
  // INVOICE META BAR
  // ════════════════════════════
  doc.setFillColor(242,218,232);
  doc.rect(0,58,W,16,'F');
  doc.setDrawColor(180,100,140);doc.setLineWidth(0.2);
  doc.line(0,58,W,58);doc.line(0,74,W,74);

  // Labels
  doc.setTextColor(130,60,100);doc.setFontSize(7);doc.setFont('helvetica','bold');
  doc.text('INVOICE NO',L+2,64);
  doc.text('DATE',L+50,64);
  doc.text('DUE DATE',L+95,64);
  doc.text('STATUS',L+145,64);

  // Values
  doc.setTextColor(44,8,62);doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text(d.num,L+2,71);
  doc.text(fdate(d.date),L+50,71);
  doc.text(fdate(d.due),L+95,71);

  // Status pill
  const sc=d.status==='Paid'?[22,160,100]:d.status==='Advance Paid'?[200,130,20]:[180,40,40];
  doc.setFillColor(...sc);doc.roundedRect(L+143,66,28,7,1.5,1.5,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(6.5);doc.setFont('helvetica','bold');
  doc.text(d.status.toUpperCase(),L+157,71,{align:'center'});

  // ════════════════════════════
  // BILL TO
  // ════════════════════════════
  let y=84;
  doc.setTextColor(130,60,100);doc.setFontSize(7);doc.setFont('helvetica','bold');
  doc.text('BILL TO',L,y);
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.3);
  doc.line(L,y+1,L+16,y+1);

  y+=7;
  doc.setTextColor(44,8,62);doc.setFontSize(14);doc.setFont('times','bold');
  doc.text(d.name,L,y);
  if(d.phone){
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,50,80);
    doc.text('Phone: '+d.phone,L,y+7);
  }

  // ════════════════════════════
  // ITEMS TABLE
  // ════════════════════════════
  y=112;
  // Header
  doc.setFillColor(44,8,62);
  doc.rect(L,y,CW,11,'F');
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.3);
  doc.line(L,y,L+CW,y);doc.line(L,y+11,L+CW,y+11);

  doc.setTextColor(255,240,220);doc.setFontSize(8);doc.setFont('helvetica','bold');
  doc.text('DESCRIPTION',L+3,y+7.5);
  doc.text('QTY',L+108,y+7.5,{align:'right'});
  doc.text('UNIT PRICE',L+140,y+7.5,{align:'right'});
  doc.text('AMOUNT',L+CW-1,y+7.5,{align:'right'});

  y+=11;
  const valid=d.items.filter(i=>i.desc||i.price);
  valid.forEach((item,idx)=>{
    const rowH=11;
    if(idx%2===0){doc.setFillColor(253,246,250);}else{doc.setFillColor(255,255,255);}
    doc.rect(L,y,CW,rowH,'F');
    doc.setDrawColor(235,210,225);doc.setLineWidth(0.15);
    doc.line(L,y+rowH,L+CW,y+rowH);

    doc.setTextColor(44,8,62);doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text(item.desc||'-',L+3,y+7.5);
    doc.text(String(item.qty||1),L+108,y+7.5,{align:'right'});
    doc.setFont('helvetica','normal');
    doc.text('Rs.'+Number(item.price||0).toFixed(0),L+140,y+7.5,{align:'right'});
    doc.setFont('helvetica','bold');
    doc.text('Rs.'+Number((item.qty||0)*(item.price||0)).toFixed(0),L+CW-1,y+7.5,{align:'right'});
    y+=rowH;
  });

  // Bottom table line
  doc.setDrawColor(44,8,62);doc.setLineWidth(0.3);
  doc.line(L,y,L+CW,y);

  // ════════════════════════════
  // TOTALS
  // ════════════════════════════
  y+=8;
  const tx=L+CW-75;
  function trow(label,val,bold){
    doc.setFontSize(10);
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.setTextColor(120,60,95);doc.text(label,tx,y);
    doc.setTextColor(44,8,62);doc.text(val,L+CW-1,y,{align:'right'});
    y+=8;
  }
  trow('Subtotal','Rs.'+d.sub.toFixed(0),false);
  if(d.disc>0)trow('Discount','- Rs.'+d.disc.toFixed(0),false);

  // Grand total highlight
  doc.setFillColor(44,8,62);
  doc.roundedRect(tx-3,y-2,CW-(tx-L)+2,13,2,2,'F');
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.4);
  doc.roundedRect(tx-3,y-2,CW-(tx-L)+2,13,2,2,'S');
  doc.setTextColor(255,240,220);doc.setFontSize(12);doc.setFont('times','bold');
  doc.text('TOTAL',tx+1,y+7);
  doc.text('Rs. '+d.grand.toFixed(0),L+CW-2,y+7,{align:'right'});
  y+=20;

  // ════════════════════════════
  // PAYMENT SECTION
  // ════════════════════════════
  doc.setFillColor(248,232,242);
  doc.roundedRect(L,y,CW,62,3,3,'F');
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.3);
  doc.roundedRect(L,y,CW,62,3,3,'S');

  // Payment title
  doc.setTextColor(44,8,62);doc.setFontSize(11);doc.setFont('times','bolditalic');
  doc.text('Payment Details',W/2,y+10,{align:'center'});
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.3);
  doc.line(W/2-28,y+12,W/2+28,y+12);

  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,50,80);
  doc.text('Scan QR with GPay / PhonePe / Paytm / Any UPI App',W/2,y+19,{align:'center'});
  doc.setFont('helvetica','bold');doc.setTextColor(44,8,62);doc.setFontSize(9);
  doc.text('UPI ID: '+UPI,W/2,y+26,{align:'center'});
  doc.setFontSize(10);doc.setTextColor(90,28,80);
  doc.text('Amount: Rs. '+d.grand.toFixed(0),W/2,y+33,{align:'center'});

  if(qr){doc.addImage(qr,'PNG',W/2-17,y+36,34,34);}

  // ════════════════════════════
  // NOTES
  // ════════════════════════════
  if(d.notes){
    y+=70;
    doc.setFillColor(253,246,250);
    doc.roundedRect(L,y,CW,14,2,2,'F');
    doc.setTextColor(130,60,100);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text('NOTE',L+4,y+6);
    doc.setFont('helvetica','normal');doc.setTextColor(44,8,62);doc.setFontSize(9);
    doc.text(d.notes,L+4,y+11);
  }

  // ════════════════════════════
  // FOOTER
  // ════════════════════════════
  doc.setFillColor(44,8,62);
  doc.rect(0,H-20,W,20,'F');
  doc.setDrawColor(201,160,76);doc.setLineWidth(0.3);
  doc.line(0,H-20,W,H-20);

  doc.setTextColor(201,160,76);doc.setFontSize(9);doc.setFont('times','bolditalic');
  doc.text('Thank you for choosing Lakshmi Designers',W/2,H-12,{align:'center'});
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(200,160,185);
  doc.text('Bus Stand Road, Gangavathi  |  UPI: '+UPI,W/2,H-6,{align:'center'});

  doc.save('Invoice-'+d.num+'-'+d.name+'.pdf');
  cnt++;localStorage.setItem('ldinv4',cnt);
  document.getElementById('inv-num').value='LD-'+String(cnt).padStart(3,'0');
  toast('Premium invoice downloaded!');
}

function shareWA(){
  const d=get();
  if(d.name==='Customer'){toast('Customer name enter cheyyi!');return;}
  let m='*Invoice - Lakshmi Designers*\n';
  m+='Bus Stand Road, Near Patil Nursing Home\nAbove Karur Vysya Bank, Gangavathi\n';
  m+='--------------------------------\n';
  m+='Invoice: *'+d.num+'*  |  Date: '+fdate(d.date)+'\n';
  m+='Due: '+fdate(d.due)+'  |  Status: *'+d.status+'*\n\n';
  m+='Customer: *'+d.name+'*\n';
  if(d.phone)m+='Phone: '+d.phone+'\n';
  m+='\n*Order Details:*\n';
  d.items.forEach(i=>{if(!i.desc&&!i.price)return;m+='- '+(i.desc||'Item')+' x '+(i.qty||1)+' = Rs.'+((i.qty||0)*(i.price||0)).toFixed(0)+'\n';});
  m+='--------------------------------\n';
  if(d.disc>0)m+='Discount: - Rs.'+d.disc.toFixed(0)+'\n';
  m+='*Total: Rs.'+d.grand.toFixed(0)+'*\n\n';
  m+='*Pay via UPI:*\n'+upiUrl(d.grand,d.name,d.num)+'\nUPI ID: *'+UPI+'*\n';
  if(d.notes)m+='\nNote: '+d.notes+'\n';
  m+='\nThank you for choosing Lakshmi Designers!';
  const p=d.phone.replace(/\D/g,'');
  window.open(p?'https://wa.me/91'+p+'?text='+encodeURIComponent(m):'https://wa.me/?text='+encodeURIComponent(m),'_blank');
}

function clearForm(){
  ['cust-name','cust-phone','notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('disc').value='0';
  document.getElementById('inv-status').value='Pending';
  items=[];addItem();toast('Cleared!');
}
</script>
