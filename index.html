<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lakshmi Designers — Order Ledger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --plum: #4A0E35;
  --rose: #8B2F5F;
  --blush: #F5D0E4;
  --cream: #FFF8FB;
  --mist: #F9EEF4;
  --text: #2A0720;
  --muted: #8A4D70;
  --border: #E8C8D8;
  --green: #1A7A52;
  --green-bg: #E8F7F1;
  --amber: #7A4A00;
  --amber-bg: #FDF4E0;
  --red: #9A2020;
  --red-bg: #FCEAEA;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--mist);
  background-image: radial-gradient(ellipse at 20% 0%, #F5D0E420 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 100%, #8B2F5F15 0%, transparent 60%);
  min-height: 100vh;
  padding: 1.25rem 1rem 3rem;
  color: var(--text);
}

.app { max-width: 680px; margin: 0 auto; }

/* HEADER */
.header {
  text-align: center;
  padding: 2rem 1.5rem 1.75rem;
  margin-bottom: 1.5rem;
  background: linear-gradient(150deg, #6B1D4A 0%, #2A0720 60%, #4A0E35 100%);
  border-radius: 20px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px #4A0E3540;
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 20%, #F5D0E420 0%, transparent 55%);
  pointer-events: none;
}
.header-lotus { font-size: 22px; margin-bottom: 6px; opacity: 0.85; letter-spacing: 6px; }
.header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 3px;
  margin-bottom: 4px;
  color: #FFE8F3;
}
.header p { font-size: 11px; opacity: 0.55; letter-spacing: 4px; text-transform: uppercase; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat {
  background: #fff;
  border-radius: 14px;
  padding: 1rem 0.75rem;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px #4A0E3510;
  transition: transform 0.15s;
}
.stat:hover { transform: translateY(-2px); }
.stat-label { font-size: 10px; color: var(--muted); margin-bottom: 5px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; }
.stat-val { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; color: var(--plum); line-height: 1; }

/* ADD BUTTON */
.add-btn {
  width: 100%; padding: 13px;
  background: #fff;
  border: 1.5px dashed var(--rose);
  border-radius: 14px;
  font-size: 14px; cursor: pointer;
  color: var(--rose);
  margin-bottom: 1.25rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.add-btn:hover { background: var(--blush); border-style: solid; }

/* FORM CARD */
.form-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 20px #4A0E3512;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

.form-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 700;
  color: var(--rose);
  margin-bottom: 1.1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }

.form-group input,
.form-group textarea {
  font-size: 13.5px;
  padding: 9px 12px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--cream);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px #8B2F5F15;
}

.input-rupee-wrap { position: relative; }
.input-rupee-wrap .rupee-prefix {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--rose); font-size: 14px; font-weight: 600; pointer-events: none;
}
.input-rupee-wrap input { padding-left: 26px; }

.form-group textarea { resize: vertical; min-height: 65px; }
.form-full { grid-column: 1 / -1; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

.btn-primary {
  padding: 9px 22px; border-radius: 9px; border: none;
  background: linear-gradient(135deg, var(--rose), var(--plum));
  color: #fff; font-size: 13.5px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  box-shadow: 0 3px 10px #4A0E3530;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-cancel {
  padding: 9px 22px; border-radius: 9px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 13.5px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-cancel:hover { background: var(--mist); }

/* ORDERS */
.orders-list { display: flex; flex-direction: column; gap: 12px; }

.order-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.1rem 1.25rem;
  box-shadow: 0 2px 10px #4A0E3508;
  transition: transform 0.15s, box-shadow 0.15s;
  border-left: 4px solid var(--border);
}
.order-card:hover { transform: translateY(-1px); box-shadow: 0 5px 18px #4A0E3515; }
.order-card.done { border-left-color: #1A7A52; }
.order-card.overdue { border-left-color: #C0392B; }
.order-card.pending { border-left-color: #D4830A; }

.order-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
.order-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 700; color: var(--plum); }

.order-badge {
  font-size: 10px; padding: 3px 11px; border-radius: 20px;
  letter-spacing: 0.5px; font-weight: 500; white-space: nowrap;
}
.badge-done { background: var(--green-bg); color: var(--green); }
.badge-pending { background: var(--amber-bg); color: var(--amber); }
.badge-overdue { background: var(--red-bg); color: var(--red); }

.order-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.meta-item { font-size: 11px; color: var(--muted); letter-spacing: 0.3px; }
.meta-item span { color: var(--text); font-size: 12.5px; font-weight: 600; display: block; margin-top: 1px; }

.order-amount {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, #4A0E3510, #8B2F5F10);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 12px;
  margin-bottom: 10px;
  font-size: 15px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  color: var(--plum);
}
.order-amount .rs { font-size: 14px; opacity: 0.75; }

.order-desc {
  font-size: 12.5px; color: #6A3050;
  margin-bottom: 10px; padding: 8px 11px;
  background: var(--cream); border-radius: 9px;
  border: 0.5px solid var(--border);
  line-height: 1.6;
}

.order-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

.btn-tick {
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid #1A7A52; background: transparent;
  color: var(--green); font-size: 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  transition: background 0.15s;
}
.btn-tick:hover { background: var(--green-bg); }

.btn-wa {
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid #25D366; background: transparent;
  color: #1A7A52; font-size: 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.btn-wa:hover { background: #e6fdf1; }

.btn-del {
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--red); font-size: 12px; cursor: pointer;
  margin-left: auto;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.btn-del:hover { background: var(--red-bg); }

.empty {
  text-align: center; padding: 3.5rem 2rem;
  color: var(--muted); font-size: 14.5px;
  background: #fff; border-radius: 16px;
  border: 1px dashed var(--border);
  line-height: 2;
}
.empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--plum); color: #fff;
  padding: 11px 22px; border-radius: 10px;
  font-size: 13.5px; display: none; z-index: 999;
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 6px 24px #4A0E3550;
  white-space: nowrap;
}

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .order-meta { grid-template-columns: 1fr 1fr; }
  .stat-val { font-size: 26px; }
  .header h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-lotus">🪷</div>
    <h1>Lakshmi Designers</h1>
    <p>✦ Order Ledger ✦</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pending</div>
      <div class="stat-val" id="stat-pending">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Done</div>
      <div class="stat-val" id="stat-done">0</div>
    </div>
  </div>

  <button class="add-btn" onclick="toggleForm()">＋ New Order</button>

  <div class="form-card" id="form-card" style="display:none;">
    <h3>New Order</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Customer Name</label>
        <input id="f-name" placeholder="e.g. Priya Reddy"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input id="f-phone" placeholder="e.g. 9876543210" type="tel"/>
      </div>
      <div class="form-group">
        <label>Order Date</label>
        <input type="date" id="f-given"/>
      </div>
      <div class="form-group">
        <label>Delivery Date</label>
        <input type="date" id="f-delivery"/>
      </div>
      <div class="form-group">
        <label>Total Bill (₹)</label>
        <div class="input-rupee-wrap">
          <span class="rupee-prefix">₹</span>
          <input id="f-amount" placeholder="0" type="number" min="0"/>
        </div>
      </div>
      <div class="form-group form-full">
        <label>Order Details</label>
        <textarea id="f-desc" placeholder="e.g. Silk saree blouse, size 38, dark green colour"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
      <button class="btn-primary" onclick="addOrder()">Save Order</button>
    </div>
  </div>

  <div class="orders-list" id="orders-list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
let orders = JSON.parse(localStorage.getItem('ld-orders-v3') || '[]');

// Migrate from old storage key
(function() {
  const old = localStorage.getItem('ld-orders-v2');
  if (old && !localStorage.getItem('ld-orders-v3')) {
    orders = JSON.parse(old);
    save();
  }
})();

function save() { localStorage.setItem('ld-orders-v3', JSON.stringify(orders)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function toggleForm() {
  const f = document.getElementById('form-card');
  const visible = f.style.display !== 'none';
  f.style.display = visible ? 'none' : 'block';
  if (!visible) {
    document.getElementById('f-given').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-name').focus();
  }
}

function addOrder() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const given = document.getElementById('f-given').value;
  const delivery = document.getElementById('f-delivery').value;
  const desc = document.getElementById('f-desc').value.trim();
  const amount = document.getElementById('f-amount').value.trim();
  if (!name || !phone || !delivery) { showToast('Name, phone & delivery date required!'); return; }
  orders.unshift({ id: Date.now(), name, phone, given, delivery, desc, amount: amount || '', done: false });
  save(); render(); toggleForm();
  ['f-name','f-phone','f-desc','f-delivery','f-amount'].forEach(id => document.getElementById(id).value = '');
  showToast('✓ Order saved!');
}

function markDone(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.done = true;
  save(); render();
  const msg = encodeURIComponent("Hi " + o.name + "! Your order is ready at Lakshmi Designers. Please visit us to collect it. Thank you! 🌸");
  const num = o.phone.replace(/\D/g, '');
  window.open("https://wa.me/91" + num + "?text=" + msg, '_blank');
  showToast('✓ Marked done! Opening WhatsApp...');
}

function sendWAAgain(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const msg = encodeURIComponent("Hi " + o.name + "! Your order is ready at Lakshmi Designers. Please visit us to collect it. Thank you! 🌸");
  const num = o.phone.replace(/\D/g, '');
  window.open("https://wa.me/91" + num + "?text=" + msg, '_blank');
}

function deleteOrder(id) {
  if (!confirm('Delete this order?')) return;
  orders = orders.filter(x => x.id !== id);
  save(); render();
  showToast('Order deleted');
}

function getStatus(o) {
  if (o.done) return 'done';
  const today = new Date(); today.setHours(0,0,0,0);
  const del = new Date(o.delivery);
  return del < today ? 'overdue' : 'pending';
}

function fmt(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return day + '/' + m + '/' + y;
}

function fmtAmount(a) {
  if (!a) return '';
  const n = parseFloat(a);
  if (isNaN(n)) return '';
  return n.toLocaleString('en-IN');
}

function render() {
  const list = document.getElementById('orders-list');
  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-done').textContent = orders.filter(o => o.done).length;
  document.getElementById('stat-pending').textContent = orders.filter(o => !o.done).length;

  if (!orders.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🧵</div>No orders yet.<br>Click "+ New Order" to add your first order.</div>';
    return;
  }

  list.innerHTML = orders.map(o => {
    const status = getStatus(o);
    const badgeClass = status === 'done' ? 'badge-done' : status === 'overdue' ? 'badge-overdue' : 'badge-pending';
    const badgeText = status === 'done' ? '✓ Completed' : status === 'overdue' ? '⚠ Overdue' : '● Pending';
    const amtStr = fmtAmount(o.amount);

    return '<div class="order-card ' + status + '">' +
      '<div class="order-top">' +
        '<div class="order-name">' + o.name + '</div>' +
        '<span class="order-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
      '<div class="order-meta">' +
        '<div class="meta-item">Phone<span>' + o.phone + '</span></div>' +
        '<div class="meta-item">Given<span>' + fmt(o.given) + '</span></div>' +
        '<div class="meta-item">Delivery<span>' + fmt(o.delivery) + '</span></div>' +
      '</div>' +
      (amtStr ? '<div class="order-amount"><span class="rs">₹</span>' + amtStr + '</div>' : '') +
      (o.desc ? '<div class="order-desc">' + o.desc + '</div>' : '') +
      '<div class="order-actions">' +
        (!o.done
          ? '<button class="btn-tick" onclick="markDone(' + o.id + ')">✓ Mark Ready + WhatsApp</button>'
          : '<button class="btn-wa" onclick="sendWAAgain(' + o.id + ')">WhatsApp again</button>') +
        '<button class="btn-del" onclick="deleteOrder(' + o.id + ')">Delete</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

render();
</script>
</body>
</html>
